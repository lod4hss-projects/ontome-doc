<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Document</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="icon" type="image/x-icon" href="//ontome.net/favicon.ico">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      nativeEmoji: false,
      name: '',
      repo: '',
      loadSidebar: true,
      notFoundPage: true,
      timeUpdater: {
        text: "[Last updated: {docsify-updated}]",
        formatUpdated: "{YYYY}/{MM}/{DD} - {HH}:{mm}",
        whereToPlace: "top",  // "top" or "bottom", default to "bottom"
      },
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-mermaid/dist/docsify-mermaid.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-updated/src/time-updater.min.js"></script>
  <script>mermaid.initialize({ startOnLoad: true });</script>
</body>
</html>
